<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    (function () {
      var path = window.location.pathname.replace(/\/+$/, "");

      if (path === "/RD4" || path === "/rd4") {
        window.location.replace("https://shirabeo.com/RD4/");
        return;
      }

      if (path === "/SC" || path === "/sc") {
        window.location.replace("https://shirabeo.com/SC/");
        return;
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
